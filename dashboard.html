<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:opsz,wght@14..32,500&family=Manrope:wght@200..800&display=swap"
        rel="stylesheet">
    <title>Issue Tracker Dashboard</title>

    <style>
        * {
            font-family: 'Geist', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <nav
        class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-around gap-3">

        <div class="flex items-center gap-3">
            <img src="logo.png" alt="GitHub Logo" class="w-9 h-9">
            <span class="font-semibold text-lg">GitHub Issues Tracker</span>
        </div>

        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            <div class="flex items-center border border-gray-300 rounded px-4 py-2 bg-white w-full sm:w-64 ">
                <img src="search.png" alt="search" class="w-5 h-5 mr-2 opacity-50">
                <input type="text" id="search-input" placeholder="Search issues..."
                    class="text-gray-700 placeholder-gray-400 focus:outline-none w-full">
            </div>
            <button
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded cursor-pointer w-full sm:w-auto">
                + New Issue
            </button>
        </div>
    </nav>

    <div class="flex flex-col items-center gap-4 mt-8 px-4 pb-10">

        <div class="bg-white rounded-lg p-6 w-full max-w-5xl">
            <div class="flex items-center gap-3">
                <button data-filter="all"
                    class="tab-btn bg-indigo-600 text-white font-semibold px-6 py-2 rounded cursor-pointer">All</button>
                <button data-filter="open"
                    class="tab-btn bg-white text-gray-700 font-medium px-6 py-2 border border-gray-300 rounded cursor-pointer">Open</button>
                <button data-filter="closed"
                    class="tab-btn bg-white text-gray-700 font-medium px-6 py-2 border border-gray-300 rounded cursor-pointer">Closed</button>
            </div>
        </div>

        <div class="bg-white rounded-lg px-6 py-4 w-full max-w-5xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
                    <img src="circle.png" alt="" class="w-6 h-6">
                </div>
                <div>
                    <p class="font-bold text-lg text-gray-900"><span id="issue-count">0</span> Issues</p>
                    <p class="text-sm text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 sm:flex-row flex-col">
                <span class="flex items-center gap-1 text-sm text-gray-600">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> Open
                </span>
                <span class="flex items-center gap-1 text-sm text-gray-600">
                    <span class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"></span> Closed
                </span>
            </div>
        </div>

        <div id="loading-spinner" class="hidden w-full max-w-5xl flex justify-center py-10">
            <div class="w-10 h-10 border-4 border-gray-200 border-t-indigo-600 rounded-full animate-spin"></div>
        </div>

        <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-5xl">
        </div>

    </div>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
            <div id="modal-body"></div>
            <div class="mt-6 flex justify-end">
                <button onclick="closeModal()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded cursor-pointer">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="modal.js"></script>
    <script src="search.js"></script>

</body>

</html>
